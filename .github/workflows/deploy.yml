name: Deploy Worknexus Stack

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- 1. BUILD & PUSH BACKEND DOCKER IMAGE ---
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend # Pointing to your backend folder
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/worknexus-backend:latest

      # --- 2. BUILD REACT FRONTEND ---
      - name: Set up Node.js for React Build
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json # Pointing to your frontend folder

      - name: Build React Application
        run: |
          cd frontend
          npm ci
          npm run build

      # --- 3. DEPLOY TO ORACLE UBUNTU SERVER ---
      - name: Upload Backend compose and env
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_SECRET_KEY }}
          source: "backend/docker-compose.yml"
          target: "~/worknexus"

      - name: Upload Backend .env
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_SECRET_KEY }}
          source: "backend/.env"
          target: "~/worknexus"

      - name: Deploy stack on server via docker compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_SECRET_KEY }}
          script: |
            set -e
            mkdir -p ~/worknexus
            cd ~/worknexus

            # Write .env from GitHub Secrets (do NOT echo secrets in logs)
            cat > .env <<'EOF'
            PORT=3000
            NODE_ENV=production
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            DATABASE_URL="postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@postgres_db:5432/${{ secrets.POSTGRES_DB }}?schema=public"
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            EOF

            # Ensure docker compose v2 is available (command is `docker compose`)
            docker compose pull || true
            docker compose up -d --build

      - name: Sync Frontend Build Files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_SECRET_KEY }}
          source: "frontend/dist/**" # Use "frontend/build/*" if your project compiles to build/ instead of dist/
          target: "/var/www/fyp-frontend"
          strip_components: 2