name: Deploy Worknexus Stack

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------
      # 1. CHECKOUT REPOSITORY
      # -----------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -----------------------------------
      # 2. LOGIN TO DOCKER HUB
      # -----------------------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -----------------------------------
      # 3. BUILD & PUSH BACKEND IMAGE
      # -----------------------------------
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/worknexus-backend:latest

      # -----------------------------------
      # 4. BUILD FRONTEND
      # -----------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      # -----------------------------------
      # 5. DEPLOY BACKEND ON SERVER
      # -----------------------------------
      - name: Deploy Backend on Oracle Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_SECRET_KEY }}
          script: |
            set -e

            cd ~/worknexus

            echo "Pulling latest Docker images..."
            docker compose pull

            echo "Restarting containers..."
            docker compose up -d

            echo "Cleaning unused Docker images..."
            docker image prune -f

      # -----------------------------------
      # 6. DEPLOY FRONTEND FILES
      # -----------------------------------
      - name: Upload Frontend Dist Files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_SECRET_KEY }}
          source: "frontend/dist/*"
          target: "/var/www/fyp-frontend"
          strip_components: 2